name: Feature Request
description: Suggest an idea for NakshAstraMCP
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the Feature
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Why would this feature be useful to you and other users?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: A clear and concise description of any alternative solutions or features you've considered.
